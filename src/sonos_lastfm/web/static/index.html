<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonos-lastfm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="grain"></div>

    <header>
        <div class="logo">
            <span class="logo-sonos">sonos</span><span class="logo-sep">/</span><span class="logo-lastfm">last.fm</span>
        </div>
        <div class="status" id="status-indicator">
            <span class="status-dot"></span>
            <span class="status-text">disconnected</span>
        </div>
    </header>

    <main id="players">
        <div id="empty-state" class="empty-state">
            <div class="empty-icon">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                    <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                    <circle cx="32" cy="32" r="18" stroke="currentColor" stroke-width="1" opacity="0.2"/>
                    <circle cx="32" cy="32" r="4" fill="currentColor" opacity="0.25"/>
                    <line x1="32" y1="4" x2="32" y2="10" stroke="currentColor" stroke-width="1" opacity="0.15"/>
                    <line x1="32" y1="54" x2="32" y2="60" stroke="currentColor" stroke-width="1" opacity="0.15"/>
                </svg>
            </div>
            <p class="empty-title">Silence</p>
            <p class="empty-sub">No speakers are currently playing</p>
        </div>
    </main>

    <footer>
        <span>Scrobbling from your local network</span>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
