<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="sonos-lastfm">
    <title>sonos-lastfm</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="bg-glow" class="bg-glow"></div>
    <header>
        <div class="header-left">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
            <span class="logo-text">sonos-lastfm</span>
        </div>
        <div class="header-right">
            <div class="status" id="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">Disconnected</span>
            </div>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
                <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab active" data-tab="now-playing">Now Playing</button>
        <button class="tab" data-tab="stats">Stats</button>
    </nav>

    <!-- Now Playing Tab -->
    <div id="tab-now-playing" class="tab-content active">
        <main id="players">
            <div id="empty-state" class="empty-state">
                <div class="empty-art">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                </div>
                <p class="empty-title">Nothing playing</p>
                <p class="empty-sub">Music from your Sonos speakers will appear here</p>
            </div>
        </main>

        <section id="history-section" class="history-section" style="display:none">
            <h2 class="history-title">Recent Scrobbles</h2>
            <div id="history-list" class="history-list"></div>
        </section>
    </div>

    <!-- Stats Tab -->
    <div id="tab-stats" class="tab-content">
        <div class="stats-container">
            <div class="stats-header">
                <div class="stats-total">
                    <span class="stats-total-count" id="stats-total-count">--</span>
                    <span class="stats-total-label">total scrobbles</span>
                </div>
                <div class="period-selector">
                    <button class="period-btn active" data-period="7day">7 days</button>
                    <button class="period-btn" data-period="1month">Month</button>
                    <button class="period-btn" data-period="3month">3 months</button>
                    <button class="period-btn" data-period="12month">Year</button>
                    <button class="period-btn" data-period="overall">All time</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stats-column">
                    <h3 class="stats-column-title">Top Artists</h3>
                    <div id="stats-artists" class="stats-list"></div>
                </div>
                <div class="stats-column">
                    <h3 class="stats-column-title">Top Albums</h3>
                    <div id="stats-albums" class="stats-list"></div>
                </div>
                <div class="stats-column">
                    <h3 class="stats-column-title">Top Tracks</h3>
                    <div id="stats-tracks" class="stats-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
